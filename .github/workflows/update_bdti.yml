name: Update BDTI Data

on:
  schedule:
    - cron: '30 9 * * 1-5'  # 平日 18:30 JST
  workflow_dispatch:          # 手動実行ボタン

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run fetch_bdti.py
        run: python fetch_bdti.py

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add bdti_latest.json bdti_data.csv
          git diff --staged --quiet || git commit -m "Update BDTI data $(date +'%Y-%m-%d')"
          git push
